{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark text-light shadow-lg">
            <div class="card-body p-5">
                <h3 class="text-center mb-4" style="color: #ff9966;">Welcome Back, Please Login</h3>
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Login Type</label>
                        <select name="login_type" class="form-select" required>
                            <option value="user">User</option>
                            <option value="cloudserver">Cloud Server</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">LOGIN</button>
                    <p class="text-center mt-3">Don't have an account? <a href="{% url 'user' %}" class="text-info">Sign Up</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
