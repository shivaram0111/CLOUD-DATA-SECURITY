{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2 class="text-center text-info mb-4">Pending User Registrations</h2>
    <div class="card bg-dark shadow-lg">
        <div class="card-body">
            <div class="table-responsive" style="max-height: 30rem; overflow-y: auto;">
                <table class="table table-dark table-hover table-striped">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Name</th>
                            <th scope="col">Email</th>
                            <th scope="col">Contact</th>
                            <th scope="col">Address</th>
                            <th scope="col">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in usersdata %}
                        <tr>
                            <td>{{ user.id }}</td>
                            <td>{{ user.name }}</td>
                            <td>{{ user.email }}</td>
                            <td>{{ user.contact }}</td>
                            <td>{{ user.address }}</td>
                            <td>
                                <a href="{% url 'acceptuser' user.id %}" class="btn btn-success btn-sm">Accept</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="6" class="text-center text-muted">No pending users.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
