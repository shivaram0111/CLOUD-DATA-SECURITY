{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark text-light shadow-lg border-warning">
            <div class="card-body p-5">
                <h3 class="text-center text-warning mb-4">Cloud Server Authentication</h3>
                <form method="POST" action="{% url 'cloudlogin' %}">
                    {% csrf_token %}
                    <input type="hidden" name="login_type" value="cloudserver">
                    <div class="mb-3">
                        <label>Admin Email</label>
                        <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label>Admin Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">SECURE LOGIN</button>
                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-muted"><small>Return to User Login</small></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
